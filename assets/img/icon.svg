<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Smooth Glow Filter -->
    <filter id="glow-sq" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="shadow-sq" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="fb-sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="ff-sq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="rust-sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>

    <linearGradient id="cyan-sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

    <linearGradient id="purple-sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <linearGradient id="green-sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background Plate -->
  <rect width="100%" height="100%" rx="16" fill="#12141C"/>

  <!-- Centered and scaled graphic mark container -->
  <g transform="translate(-19.57, -11.64) scale(1.22)">
    <!-- Ground Shadow -->
    <ellipse cx="68" cy="104" rx="44" ry="5" fill="#000000" opacity="0.65" filter="blur(4px)"/>

    <!-- Folder Backplate -->
    <path d="M25 29 C25 26.2 27.2 24 30 24 H58 L68 34 H107 C109.8 34 112 36.2 112 39 V95 C112 97.8 109.8 100 107 100 H30 C27.2 100 25 97.8 25 95 Z" 
          fill="url(#fb-sq)" 
          stroke="#384356" 
          stroke-width="1.2"/>

    <!-- Treemap Blocks with Padding -->
    <g id="cells" filter="url(#shadow-sq)">
      <rect x="31" y="39" width="46" height="26" rx="3" fill="url(#rust-sq)" stroke="#EF6868" stroke-width="0.5"/>
      <rect x="31" y="67" width="28" height="26" rx="3" fill="url(#cyan-sq)" stroke="#22D3EE" stroke-width="0.5"/>
      <rect x="61" y="67" width="16" height="26" rx="2" fill="url(#green-sq)" stroke="#34D399" stroke-width="0.5"/>
      <rect x="79" y="39" width="28" height="54" rx="3" fill="url(#purple-sq)" stroke="#A78BFA" stroke-width="0.5"/>
    </g>

    <!-- Contoured Cover Flap -->
    <path d="M25 54 C25 51.5 27 49.5 29.5 49.5 H55 L65 57.5 H107.5 C110 57.5 112 59.5 112 62 V95 C112 97.8 109.8 100 107 100 H30 C27.2 100 25 97.8 25 95 Z" 
          fill="url(#ff-sq)" 
          stroke="#4B5563" 
          stroke-width="1"
          opacity="0.9"/>
    
    <!-- Cover Highlight Lip -->
    <path d="M26.5 50 L54 50 L64 58 L111 58" stroke="#9CA3AF" stroke-width="0.8" opacity="0.3" fill="none"/>

    <!-- Color-Coordinated Traverser Nodes -->
    <g id="nodes">
      <path d="M54 52 L69 80 L92.5 66" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
      <circle cx="54" cy="52" r="4.5" fill="#EF4444" stroke="#FFFFFF" stroke-width="1.2" filter="url(#glow-sq)"/>
      <circle cx="69" cy="80" r="4.5" fill="#10B981" stroke="#FFFFFF" stroke-width="1.2" filter="url(#glow-sq)"/>
      <circle cx="92.5" cy="66" r="4.5" fill="#8B5CF6" stroke="#FFFFFF" stroke-width="1.2" filter="url(#glow-sq)"/>
    </g>
  </g>
</svg>
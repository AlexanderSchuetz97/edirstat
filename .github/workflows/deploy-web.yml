name: Deploy Landing Page to GH Pages

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: write

jobs:
  deploy-web:
    name: Deploy Web (Arch Container)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch
      options: --user root # How I wish this were GitLab

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm zola nodejs npm

      - name: Install Node Dependencies & Build Assets
        run: |
          cd web
          npm ci
          npm run build:assets

      - name: Build Zola Site
        run: |
          cd web
          zola build

      - name: Inject Custom Domain CNAME
        run: echo "edirstat.com" > web/public/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/public
          publish_branch: gh-pages

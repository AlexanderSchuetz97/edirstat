<!DOCTYPE html>
<html lang="{{ lang | default(value="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ config.title }}">
    <meta property="og:description" content="{{ config.description }}">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="{{ config.title }}">
    <meta property="twitter:description" content="{{ config.description }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheets & Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ get_url(path="favicon.ico") | safe }}">
    <link rel="stylesheet" href="{{ get_url(path="assets/main.css", cachebust=true) | safe }}">
</head>
<body>
    {% block content %}{% endblock content %}
    
    <!-- Scripts -->
    <script type="module" src="{{ get_url(path="assets/main.js", cachebust=true) | safe }}"></script>
</body>
</html>
